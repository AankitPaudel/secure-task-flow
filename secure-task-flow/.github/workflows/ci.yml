name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: API e2e
        run: npm run e2e:api

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Dashboard e2e
        run: npm run e2e:dashboard

      - name: Build
        run: npm run build
