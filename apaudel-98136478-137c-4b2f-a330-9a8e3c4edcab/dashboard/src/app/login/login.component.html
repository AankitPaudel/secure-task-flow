<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-slate-900 to-slate-800 opacity-80"></div>
  <div class="relative bg-white/95 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-200">
    <div class="flex items-center justify-center mb-6">
      <div class="h-10 w-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold shadow-md">
        TM
      </div>
    </div>
    <h2 class="login-title text-3xl font-bold text-center mb-2 text-gray-900">Task Manager</h2>
    <p class="text-center text-sm text-gray-500 mb-8">Secure, role-based task management</p>
    
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          Email
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="example@acme.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
          placeholder="password123"
        />
      </div>

      <div *ngIf="errorMessage" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium disabled:bg-gray-400 disabled:cursor-not-allowed shadow-sm"
      >
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>
    </form>

    <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-100">
      <p class="text-sm text-gray-600 font-semibold mb-2">Test Accounts:</p>
      <p class="text-xs text-gray-500">Owner: owner@acme.com / password123</p>
      <p class="text-xs text-gray-500">Admin: admin@acme.com / password123</p>
      <p class="text-xs text-gray-500">Viewer: viewer@acme.com / password123</p>
    </div>
  </div>
</div>
